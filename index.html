<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  color: #fff;
  overflow: hidden;
  background: linear-gradient(-45deg, #020024, #090979, #000000, #1a1a2e);
  background-size: 400% 400%;
  animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  text-align: center;
  padding: 100px 20px;
}

.hidden { display: none; }

input, button {
  padding: 10px;
  margin-top: 10px;
  background: transparent;
  border: 1px solid white;
  color: white;
}

button:hover {
  background: white;
  color: black;
}

.option {
  border: 1px solid white;
  padding: 10px;
  margin: 10px auto;
  width: 220px;
  cursor: pointer;
  position: relative;
}

#noBtn {
  position: absolute;
}

#heart {
  font-size: 50px;
  position: absolute;
  cursor: pointer;
}

#text {
  font-size: 1.3rem;
  max-width: 700px;
  margin: auto;
  line-height: 1.7;
}
</style>
</head>

<body>

<!-- 🔐 LOCK -->
<div id="lock" class="container">
  <h1>This isn’t for everyone.</h1>
  <p>Something you used to call me.</p>
  <input type="password" id="pass">
  <br>
  <button onclick="check()">Enter</button>
  <p id="error"></p>
</div>

<!-- 💖 MAIN -->
<div id="main" class="hidden">

  <div class="container">
    <p id="text"></p>
    <button id="nextBtn" class="hidden" onclick="next()">Continue</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="container hidden">
    <p>Do you miss me?</p>
    <div class="option" onclick="toGame()">Yes</div>
    <div class="option" onclick="toGame()">Sometimes</div>
    <div class="option" id="noBtn">No</div>
  </div>

  <!-- GAME -->
  <div id="game" class="container hidden">
    <p>Don’t let me go…</p>
    <div id="heart">💖</div>
  </div>

  <!-- FINAL -->
  <div id="final" class="container hidden">
    <p id="finalText"></p>
  </div>

</div>

<script>
let attempts = 0;

function check() {
  let p = document.getElementById("pass").value;
  let error = document.getElementById("error");

  if (p === "iloveyoupanda") {
    document.getElementById("lock").style.display = "none";
    document.getElementById("main").classList.remove("hidden");
    startStory();
  } else {
    attempts++;
    if (attempts === 1) {
      error.innerText = "Hmm… that’s not it.";
    } else {
      error.innerText = "Tell him… 143 + my nickname, ughhh.";
    }
  }
}

// ✍️ STORY TEXT
let lines = [
  "Hey…",
  "I didn’t think you’d actually come here.",
  "But I’m glad you did.",
  "It’s weird… how some people stay with you.",
  "Not in obvious ways…",
  "But in quiet moments.",
  "In random thoughts.",
  "In songs.",
  "In silence.",
  "You do that to me.",
  "And I don’t even know if you realize it.",
  "So I just wanted to ask you something…"
];

let index = 0;

function typeLine(text, callback) {
  let i = 0;
  let speed = 40;
  let el = document.getElementById("text");
  el.innerHTML = "";

  let interval = setInterval(() => {
    el.innerHTML += text.charAt(i);
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      document.getElementById("nextBtn").classList.remove("hidden");
      if (callback) callback();
    }
  }, speed);
}

function startStory() {
  typeLine(lines[index]);
}

function next() {
  index++;
  document.getElementById("nextBtn").classList.add("hidden");

  if (index < lines.length) {
    typeLine(lines[index]);
  } else {
    document.querySelector(".container").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
  }
}

// ❌ NO BUTTON RUNS
let noBtn = document.getElementById("noBtn");
noBtn.onmouseover = () => {
  noBtn.style.top = Math.random()*80+"%";
  noBtn.style.left = Math.random()*80+"%";
};

// 🎮 GAME
let heart = document.getElementById("heart");
let clicks = 0;
let time = 0;
let gameInterval;

function toGame() {
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  heart.style.top = "50%";
  heart.style.left = "50%";

  gameInterval = setInterval(() => {
    time++;
    heart.style.top = Math.random()*80+"%";
    heart.style.left = Math.random()*80+"%";

    if (time > 12) {
      clearInterval(gameInterval);
      endGame();
    }
  }, 700);
}

heart.onclick = () => {
  clicks++;
  heart.style.transform = "scale(1.2)";
  setTimeout(()=>heart.style.transform="scale(1)",100);
};

function endGame() {
  document.getElementById("game").classList.add("hidden");
  document.getElementById("final").classList.remove("hidden");

  let msg = "";

  if (clicks > 15) {
    msg = "You stayed… didn’t you?\nAnd maybe… I never stopped either.";
  } else {
    msg = "You let go…\nBut I didn’t.";
  }

  document.getElementById("finalText").innerText =
    msg + "\n\nYou still matter to me.\nMore than you probably know.";

  // SECRET
  setTimeout(() => {
    document.getElementById("finalText").innerText += "\n\n(click somewhere...)";
  }, 3000);
}

// SECRET CLICK
document.body.onclick = function() {
  if (document.getElementById("final").style.display !== "none") {
    alert("I missed you more than I ever said.");
  }
};
</script>

</body>
</html>
