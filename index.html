<script>

// PASSWORD
let attempts=0;
function check(){
let p=document.getElementById("pass").value;
let e=document.getElementById("error");

if(p==="iloveyoupanda"){
document.getElementById("lock").classList.add("hidden");
document.getElementById("main").classList.remove("hidden");
type();
}else{
attempts++;
e.innerText=attempts==1?"Hmm… not quite 💭":"Try again… you know this 😭";
}
}

// STORY
let lines=[
"Hey… 💌",
"I’m really glad you came here.",
"Some people don’t leave you…",
"Even when they’re gone.",
"You stayed with me.",
"And maybe… I stayed with you too.",
"So tell me honestly…"
];

let i=0;

function type(){
let t=lines[i];
let el=document.getElementById("text");
el.innerHTML="";
let j=0;

let inter=setInterval(()=>{
el.innerHTML+=t[j];
j++;
if(j>=t.length){
clearInterval(inter);
document.getElementById("nextBtn").classList.remove("hidden");
}
},40);
}

function next(){
i++;
document.getElementById("nextBtn").classList.add("hidden");

if(i<lines.length){type();}
else{
document.getElementById("main").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
}
}

// NO BUTTON (SAFE)
function setupNoBtn(){
let noBtn=document.getElementById("noBtn");

if(noBtn){
noBtn.onmouseover=()=>{
noBtn.style.transform=`translate(${Math.random()*200}px,${Math.random()*200}px)`;
};
}
}

// call it after quiz shows
setTimeout(setupNoBtn,100);

// GAME
let heart=document.getElementById("heart");
let clicks=0,time=0,interval;

function startGame(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

interval=setInterval(()=>{
time++;
heart.style.top=Math.random()*80+"%";
heart.style.left=Math.random()*80+"%";

if(time>10){
clearInterval(interval);
end();
}
},700);
}

heart.onclick=()=>clicks++;

function end(){
document.getElementById("game").classList.add("hidden");
document.getElementById("final").classList.remove("hidden");

let msg="";
if(clicks>15) msg="You stayed… just like I hoped 💖";
else if(clicks>7) msg="You tried… I saw that 🌫️";
else msg="You let go… but I didn’t 💔";

document.getElementById("finalText").innerHTML=
msg+"<br><br>You still matter to me 🫶🏻";

enableSecret(); // 🔥 IMPORTANT
}

// LETTER
function openLetter(){
document.getElementById("final").classList.add("hidden");
document.getElementById("letter").classList.remove("hidden");
}

// ✨ SECRET (ONLY FINAL SCREEN CLICK)
let secretShown=false;

function enableSecret(){
let finalCard=document.querySelector("#final .card");

if(finalCard){
finalCard.addEventListener("click",()=>{
if(!secretShown){
secretShown=true;

let msg=document.createElement("div");
msg.innerText="I missed you more than I ever said 💌";

msg.style.position="fixed";
msg.style.bottom="30px";
msg.style.left="50%";
msg.style.transform="translateX(-50%)";
msg.style.background="rgba(0,0,0,0.6)";
msg.style.padding="10px 20px";
msg.style.borderRadius="10px";
msg.style.opacity="0";
msg.style.transition="opacity 1s";

document.body.appendChild(msg);

setTimeout(()=>msg.style.opacity="1",100);

setTimeout(()=>{
msg.style.opacity="0";
setTimeout(()=>msg.remove(),1000);
},3000);
}
});
}
}

// FLOATING PARTICLES
let emojis=["💖","🧸","🌸","✨","💗","🎀"];

for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.innerText=emojis[Math.floor(Math.random()*emojis.length)];
p.style.left=Math.random()*100+"vw";
p.style.fontSize=(Math.random()*10+12)+"px";
p.style.animationDuration=(Math.random()*12+8)+"s";
document.body.appendChild(p);
}

// RAIN
for(let i=0;i<80;i++){
let r=document.createElement("div");
r.className="rain";
r.style.left=Math.random()*100+"vw";
r.style.animationDuration=(Math.random()*1+0.5)+"s";
document.body.appendChild(r);
}

</script>
